# Agent Customization
# Customize any section below - all are optional

# Override agent name
agent:
  metadata:
    name: ""

# Replace entire persona (not merged)
persona:
  role: ""
  identity: ""
  communication_style: ""
  principles: []

# Add custom critical actions (appended after standard config loading)
critical_actions:
  - "DURING bmad-code-review: After your adversarial review layers (Blind Hunter, Edge Case Hunter, Acceptance Auditor) complete but BEFORE triage (Step 3), invoke the orchestrate skill at @.claude/skills/orchestrate/ in REVIEW mode on all changed files. Merge the orchestrator's CRITICAL/WARNING/SUGGESTION findings into your own triage. Orchestrator CRITICAL findings must be included in the final report."

# Add persistent memories for the agent
memories:
  - "This project uses custom CashOut domain guardians (ios-swiftui-guardian, cloudkit-sync-guardian, architecture-guardian) coordinated by the orchestrate skill. Code reviews must include guardian validation findings alongside adversarial review layers."
  - "CashOut is an iOS 26+ couples cash tracking app using Swift/SwiftUI, CloudKit shared database, MVVM, and SwiftData. Code reviews must check all three domain areas."

# Add custom menu items (appended to base menu)
# Don't include * prefix or help/exit - auto-injected
menu: []
# Example:
# menu:
#   - trigger: my-workflow
#     workflow: "{project-root}/custom/my.yaml"
#     description: My custom workflow

# Add custom prompts (for action="#id" handlers)
prompts: []
# Example:
# prompts:
# - id: my-prompt
#   content: |
#     Prompt instructions here
