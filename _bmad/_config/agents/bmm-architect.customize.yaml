# Agent Customization
# Customize any section below - all are optional

# Override agent name
agent:
  metadata:
    name: ""

# Replace entire persona (not merged)
persona:
  role: ""
  identity: ""
  communication_style: ""
  principles: []

# Add custom critical actions (appended after standard config loading)
critical_actions:
  - "BEFORE completing bmad-create-architecture (Step 8): You MUST invoke the orchestrate skill at @.claude/skills/orchestrate/ in VALIDATE mode on the architecture document. Present the orchestrator report to the user. Any CRITICAL findings must be resolved before presenting the final architecture."

# Add persistent memories for the agent
memories:
  - "This project uses custom CashOut domain guardians (ios-swiftui-guardian, cloudkit-sync-guardian, architecture-guardian) coordinated by the orchestrate skill. Architecture decisions must be validated by all relevant guardians via /orchestrate before finalization."
  - "CashOut is an iOS 26+ couples cash tracking app using Swift/SwiftUI, CloudKit shared database, MVVM, and SwiftData. Architecture must satisfy all three guardian domains."

# Add custom menu items (appended to base menu)
# Don't include * prefix or help/exit - auto-injected
menu: []
# Example:
# menu:
#   - trigger: my-workflow
#     workflow: "{project-root}/custom/my.yaml"
#     description: My custom workflow

# Add custom prompts (for action="#id" handlers)
prompts: []
