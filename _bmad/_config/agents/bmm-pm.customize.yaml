# Agent Customization
# Customize any section below - all are optional

# Override agent name
agent:
  metadata:
    name: ""

# Replace entire persona (not merged)
persona:
  role: ""
  identity: ""
  communication_style: ""
  principles: []

# Add custom critical actions (appended after standard config loading)
critical_actions:
  - "BEFORE completing bmad-create-story (Step 6) or bmad-create-epics-and-stories (Step 4): You MUST invoke the orchestrate skill at @.claude/skills/orchestrate/ in VALIDATE mode to verify technical feasibility of acceptance criteria against the project's architecture and domain constraints. Any CRITICAL findings must be resolved before finalizing stories."

# Add persistent memories for the agent
memories:
  - "This project uses custom CashOut domain guardians (ios-swiftui-guardian, cloudkit-sync-guardian, architecture-guardian) coordinated by the orchestrate skill. Stories and epics must be validated for technical feasibility by domain guardians via /orchestrate before finalization."
  - "CashOut is an iOS 26+ couples cash tracking app using Swift/SwiftUI, CloudKit shared database, MVVM, and SwiftData. Story acceptance criteria must be feasible within all three domain areas."

# Add custom menu items (appended to base menu)
# Don't include * prefix or help/exit - auto-injected
menu: []
# Example:
# menu:
#   - trigger: my-workflow
#     workflow: "{project-root}/custom/my.yaml"
#     description: My custom workflow

# Add custom prompts (for action="#id" handlers)
prompts: []
# Example:
# prompts:
# - id: my-prompt
#   content: |
#     Prompt instructions here
